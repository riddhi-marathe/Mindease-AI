<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MindEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #E8F4F8 0%, #A8D8F0 50%, #7ECBA3 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Medical Animation Sidebar */
        .medical-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 100px;
            height: 100%;
            background: linear-gradient(180deg, rgba(168, 216, 240, 0.1) 0%, rgba(126, 203, 163, 0.1) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 40px 0;
            z-index: 10;
        }

        /* Heartbeat animation */
        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.2);
            }
            50% {
                transform: scale(1);
            }
        }

        /* Pulse wave animation */
        @keyframes pulseWave {
            0% {
                r: 5;
                opacity: 1;
            }
            100% {
                r: 25;
                opacity: 0;
            }
        }

        /* Medical activity line */
        @keyframes activityLine {
            0%, 100% {
                stroke-dashoffset: 100;
            }
            50% {
                stroke-dashoffset: 0;
            }
        }

        /* Float animation */
        @keyframes floatAnimation {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(15px);
            }
        }

        .animation-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 1px solid rgba(126, 203, 163, 0.2);
        }

        .heartbeat-icon {
            animation: heartbeat 1.5s ease-in-out infinite;
            font-size: 28px;
        }

        .pulse-icon svg {
            animation: pulseWave 2s ease-out infinite;
        }

        .activity-line {
            animation: activityLine 2s ease-in-out infinite;
            stroke-dasharray: 100;
        }

        .float-icon {
            animation: floatAnimation 3s ease-in-out infinite;
        }

        /* Main content positioning */
        .auth-container {
            margin-left: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Logo container */
        .logo-container {
            w-24 h-24;
            background: linear-gradient(135deg, #7ECBA3 0%, #A8D8F0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(126, 203, 163, 0.3);
        }

        .medical-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(126, 203, 163, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
        }

        .tab-button {
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-button::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: transparent;
            transition: background 0.3s ease;
        }

        .tab-button.active::after {
            background: linear-gradient(90deg, #7ECBA3, #A8D8F0);
        }

        .submit-btn {
            background: linear-gradient(135deg, #7ECBA3 0%, #5BA683 100%);
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(126, 203, 163, 0.3);
        }

        .submit-btn-register {
            background: linear-gradient(135deg, #A8D8F0 0%, #6FB8D9 100%);
        }

        .submit-btn-register:hover {
            box-shadow: 0 12px 28px rgba(168, 216, 240, 0.3);
        }

        .input-field {
            border: 1px solid rgba(126, 203, 163, 0.2);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #7ECBA3;
            box-shadow: 0 0 0 3px rgba(126, 203, 163, 0.1);
            outline: none;
        }

        @media (max-width: 768px) {
            .medical-sidebar {
                width: 100%;
                height: 80px;
                flex-direction: row;
                padding: 0 40px;
            }

            .auth-container {
                margin-left: 0;
                margin-top: 80px;
            }
        }
    </style>
</head>
<body>
    <!-- Medical Animations Sidebar -->
    <div class="medical-sidebar">
        <!-- Heartbeat -->
        <div class="animation-box">
            <div class="heartbeat-icon">❤️</div>
        </div>

        <!-- Pulse -->
        <div class="animation-box">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="5" stroke="#7ECBA3" stroke-width="2" fill="none"/>
                <circle cx="20" cy="20" r="5" stroke="#A8D8F0" stroke-width="2" fill="none" class="pulse-icon">
                    <animate attributeName="r" from="5" to="25" dur="2s" repeatCount="indefinite" />
                    <animate attributeName="opacity" from="1" to="0" dur="2s" repeatCount="indefinite" />
                </circle>
            </svg>
        </div>

        <!-- Activity Line -->
        <div class="animation-box">
            <svg width="50" height="30" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
                <polyline points="0,20 30,20 35,5 40,35 45,15 50,25 100,20" 
                         fill="none" stroke="#7ECBA3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>

        <!-- Stethoscope -->
        <div class="animation-box float-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#7ECBA3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4" fill="none"/>
                <path d="M8 8c0 2-1 4-3 5"/>
                <path d="M16 8c0 2 1 4 3 5"/>
                <path d="M12 12v6"/>
                <circle cx="7" cy="6" r="1.2" fill="currentColor"/>
                <circle cx="17" cy="6" r="1.2" fill="currentColor"/>
                <circle cx="12" cy="18" r="2" fill="none"/>
            </svg>
        </div>
    </div>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="max-w-md w-full space-y-8">
            <!-- Logo -->
            <div class="text-center">
                <div class="w-24 h-24 bg-gradient-to-r from-green-400 via-teal-400 to-blue-400 rounded-full flex items-center justify-center mx-auto mb-4" style="box-shadow: 0 8px 24px rgba(126, 203, 163, 0.4);">
                    <svg class="w-12 h-12 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <!-- Stethoscope -->
                        <circle cx="12" cy="8" r="4" fill="none"/>
                        <path d="M8 8c0 2-1 4-3 5"/>
                        <path d="M16 8c0 2 1 4 3 5"/>
                        <path d="M12 12v6"/>
                        <circle cx="7" cy="6" r="1.5" fill="currentColor"/>
                        <circle cx="17" cy="6" r="1.5" fill="currentColor"/>
                        <circle cx="12" cy="18" r="2.5" fill="none"/>
                    </svg>
                </div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-teal-600 to-blue-600 bg-clip-text text-transparent">MindEase</h1>
                <p class="text-gray-600 mt-2 font-medium">Your AI Health & Wellness Companion</p>
            </div>

            <!-- Login/Register Toggle -->
            <div class="medical-card rounded-2xl shadow-2xl p-8">
                <div class="flex mb-8">
                    <button id="loginTab" class="flex-1 py-3 px-4 text-center font-semibold text-teal-600 transition-all tab-button active">Login</button>
                    <button id="registerTab" class="flex-1 py-3 px-4 text-center font-semibold text-gray-500 transition-all tab-button">Register</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm" class="space-y-5">
                    <form id="loginFormElement" class="space-y-5">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Username</label>
                            <input type="text" id="loginUsername" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent input-field transition-all" required placeholder="Enter your username">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" id="loginPassword" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent input-field transition-all" required placeholder="Enter your password">
                        </div>
                        <button type="submit" class="w-full submit-btn py-3 px-4 rounded-lg font-semibold hover:shadow-lg transition-all duration-200">Login</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="space-y-5 hidden">
                    <form id="registerFormElement" class="space-y-5">
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Username</label>
                            <input type="text" id="regUsername" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent input-field transition-all" required placeholder="Enter your username">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Email</label>
                            <input type="email" id="regEmail" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent input-field transition-all" required placeholder="Enter your email">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Password</label>
                            <input type="password" id="regPassword" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent input-field transition-all" required placeholder="Create a password">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2">Age (Optional)</label>
                            <input type="number" id="regAge" class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent input-field transition-all" min="1" max="120" placeholder="Your age">
                        </div>
                        <button type="submit" class="w-full submit-btn submit-btn-register py-3 px-4 rounded-lg font-semibold hover:shadow-lg transition-all duration-200">Register</button>
                    </form>
                </div>

                <!-- Back to Home -->
                <div class="mt-8 text-center">
                    <a href="/" class="text-teal-600 hover:text-teal-800 font-semibold transition-all hover:underline">← Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        // Tab switching
        document.getElementById('loginTab').addEventListener('click', function() {
            document.getElementById('loginTab').className = 'flex-1 py-3 px-4 text-center font-semibold text-teal-600 transition-all tab-button active';
            document.getElementById('registerTab').className = 'flex-1 py-3 px-4 text-center font-semibold text-gray-500 transition-all tab-button';
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
        });

        document.getElementById('registerTab').addEventListener('click', function() {
            document.getElementById('registerTab').className = 'flex-1 py-3 px-4 text-center font-semibold text-blue-600 transition-all tab-button active';
            document.getElementById('loginTab').className = 'flex-1 py-3 px-4 text-center font-semibold text-gray-500 transition-all tab-button';
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('loginForm').classList.add('hidden');
        });

        // Login Form Submission
        document.getElementById('loginFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = '/dashboard';
                } else {
                    alert('Login failed. Check your credentials.');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });

        // Register Form Submission
        document.getElementById('registerFormElement').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const age = document.getElementById('regAge').value;

            try {
                const response = await fetch('/api/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password, age: age ? parseInt(age) : null })
                });

                if (response.ok) {
                    window.location.href = '/dashboard';
                } else {
                    alert('Registration failed. Try a different username or email.');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        });
    </script>
</body>
</html>
