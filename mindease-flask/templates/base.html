<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindEase - AI Health & Wellness{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-white shadow-lg min-h-screen fixed">
            <div class="flex items-center justify-center h-16 bg-gradient-to-r from-blue-600 to-indigo-600">
                <div class="flex items-center space-x-2">
                    <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                    <h1 class="text-xl font-bold text-white">MindEase</h1>
                </div>
            </div>
            <nav class="mt-8">
                <a href="{{ url_for('main.dashboard') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.dashboard' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                    Dashboard
                </a>
                <a href="{{ url_for('main.symptom_check_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.symptom_check_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="stethoscope" class="w-5 h-5 mr-3"></i>
                    Symptom Check
                </a>
                <a href="{{ url_for('main.wellness_check_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.wellness_check_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="heart" class="w-5 h-5 mr-3"></i>
                    Wellness Check
                </a>
                <a href="{{ url_for('main.mental_check_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.mental_check_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="brain" class="w-5 h-5 mr-3"></i>
                    Mental Check
                </a>
                <a href="{{ url_for('main.screening_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.screening_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="clipboard-check" class="w-5 h-5 mr-3"></i>
                    Screening
                </a>
                <a href="{{ url_for('main.tracker_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.tracker_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="activity" class="w-5 h-5 mr-3"></i>
                    Health Tracker
                </a>
                <a href="{{ url_for('main.chat_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.chat_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="message-circle" class="w-5 h-5 mr-3"></i>
                    AI Chat
                </a>
                <a href="{{ url_for('main.profile_page') }}" class="flex items-center px-6 py-3 text-gray-700 hover:bg-blue-50 hover:text-blue-600 transition {% if request.endpoint == 'main.profile_page' %}bg-blue-50 text-blue-600{% endif %}">
                    <i data-lucide="user" class="w-5 h-5 mr-3"></i>
                    Profile
                </a>
                <div class="border-t border-gray-200 mt-8 pt-4">
                    <button onclick="logout()" class="flex items-center px-6 py-3 text-gray-700 hover:bg-red-50 hover:text-red-600 transition w-full">
                        <i data-lucide="log-out" class="w-5 h-5 mr-3"></i>
                        Logout
                    </button>
                </div>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="ml-64 flex-1">
            <header class="bg-white shadow-sm border-b border-gray-200">
                <div class="px-6 py-4">
                    <h2 class="text-2xl font-semibold text-gray-900">{% block page_title %}Dashboard{% endblock %}</h2>
                </div>
            </header>

            <main class="p-6">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        lucide.createIcons();

        function logout() {
            fetch('/api/user/logout', { method: 'POST' })
                .then(() => {
                    window.location.href = '/';
                })
                .catch(error => {
                    console.error('Logout error:', error);
                    window.location.href = '/';
                });
        }
    </script>
</body>
</html></content>
